<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="imagens/Decor1.png" alt="Imagem do topo" class="topo">

        <div class="login-box">
            <h2>Login</h2>
            <p class="descricao">Página de cadastro feito com esboço no Figma  
                para fins educacionais de UX/UI Design</p>

            <form id="login-form">
                <label for="email"><strong>E-mail</strong></label>
                <input type="email" id="email" placeholder="Digite seu e-mail :)" required>

                <label for="senha"><strong>Senha</strong></label>
                <div class="senha-container">
                    <input type="password" id="senha" placeholder="Digite sua senha :)" required>
                    <button type="button" id="mostrar-senha" class="mostrar-senha">Mostrar</button>
                </div>

                <p class="aviso">
                    Ao usar o site, você atesta que é maior de 18 anos e  
                    está de acordo com a <a href="#">Política de Privacidade.</a>
                </p>

                <button type="submit" class="botao-verde">Continuar</button>
            </form>

            <p class="criar-conta"><strong>Não tem uma conta?</strong></p>
            <button id="criar-conta" class="botao-azul">Abra sua conta aqui :)</button>
        </div>

        <img src="imagens/Logotipo.png" alt="Logotipo" class="logotipo">
        
        <img src="imagens/logo2.jpg" alt="logo2" class="logo2">
        <img src="imagens/final.jpg" alt="final" class="final">
    </div>

    <script>
        document.getElementById('criar-conta').addEventListener('click', function() {
            window.location.href = 'cadastro.html';
        });

        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            const storedEmail = localStorage.getItem('email');
            const storedSenha = localStorage.getItem('senha');

            if (email === storedEmail && senha === storedSenha) {
                window.location.href = 'perfil.html';
            } else {
                alert('Email ou senha incorretos. Tente novamente.');
            }
        });

        document.getElementById('mostrar-senha').addEventListener('click', function() {
            const senhaInput = document.getElementById('senha');
            if (senhaInput.type === 'password') {
                senhaInput.type = 'text';
                this.textContent = 'Ocultar';
            } else {
                senhaInput.type = 'password';
                this.textContent = 'Mostrar';
            }
        });
    </script>
</body>
</html>
